name: 이슈 close/reopen/open 시 부모·개발상태 동기화

on:
  issues:
    types: [closed, reopened, opened]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 이슈 상태 변경에 따라 부모 close/reopen + 개발상태/Status 자동 갱신
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_PAT || secrets.GITHUB_TOKEN }}
          script: |
            // ─ 설정 ────────────────────────────────────
            const PROJECT_ID = 'PVT_kwHOBcajac4BVIW4';
            // 'Auto-close issue' 프로젝트 워크플로우(Status=Done → 이슈 close) 와 충돌 방지를 위해
            // reopen 시 built-in Status 도 'Todo' 로 같이 되돌립니다.
            const STATUS_TODO_KEYWORDS = ['Todo', 'todo', 'To do', '할 일'];
            // ───────────────────────────────────────────

            const action = context.payload.action;
            const issueNum = context.payload.issue.number;
            console.log(`event=issues.${action}, #${issueNum}`);

            // 프로젝트의 단일선택 필드 한 번만 조회 (캐시)
            let _proj = null;
            async function getProj() {
              if (_proj) return _proj;
              const q = await github.graphql(`
                query($id: ID!) {
                  node(id: $id) {
                    ... on ProjectV2 {
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id name options { id name }
                          }
                        }
                      }
                    }
                  }
                }
              `, { id: PROJECT_ID });
              _proj = q.node;
              return _proj;
            }

            async function setSelect(issueNumber, fieldName, optionMatcher) {
              const proj = await getProj();
              const field = (proj?.fields?.nodes || []).find(f => f?.name === fieldName);
              if (!field) { console.log(`'${fieldName}' 필드 없음`); return; }
              const opt = field.options.find(o => optionMatcher(o.name));
              if (!opt) { console.log(`'${fieldName}' 에 매칭 옵션 없음`); return; }

              const itemQ = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      projectItems(first: 20) {
                        nodes {
                          id
                          project { id }
                          fieldValueByName(name: "${fieldName}") {
                            ... on ProjectV2ItemFieldSingleSelectValue { optionId }
                          }
                        }
                      }
                    }
                  }
                }
              `, { owner: context.repo.owner, repo: context.repo.repo, number: issueNumber });
              const items = itemQ.repository.issue?.projectItems?.nodes || [];
              const item = items.find(i => i.project.id === PROJECT_ID);
              if (!item) { console.log(`#${issueNumber}: 프로젝트에 없음`); return; }
              if (item.fieldValueByName?.optionId === opt.id) {
                console.log(`#${issueNumber} ${fieldName}: 이미 ${opt.name}`);
                return;
              }
              await github.graphql(`
                mutation($p: ID!, $i: ID!, $f: ID!, $o: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $p, itemId: $i, fieldId: $f, value: { singleSelectOptionId: $o }
                  }) { projectV2Item { id } }
                }
              `, { p: PROJECT_ID, i: item.id, f: field.id, o: opt.id });
              console.log(`#${issueNumber} ${fieldName} → ${opt.name}`);
            }

            const isDash = (n) => (n === '—' || n === '-' || /^none$/i.test(n));
            const isTodo = (n) => STATUS_TODO_KEYWORDS.some(k => n === k || n.includes(k));
            const isFixing = (n) => n.includes('수정중');
            const isDone = (n) => n.includes('수정완료');

            async function getParent(num) {
              const r = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) { parent { number state } }
                  }
                }
              `, { owner: context.repo.owner, repo: context.repo.repo, number: num });
              return r.repository.issue?.parent || null;
            }

            // ====== Case A: issues.opened ======
            // 새 서브이슈가 등록됐는데 부모가 CLOSED라면 → 부모 reopen
            // (Auto-close issue 워크플로우 충돌 방지를 위해 부모 Status 도 먼저 Todo 로 되돌림)
            if (action === 'opened') {
              const parent = await getParent(issueNum);
              if (parent && parent.state === 'CLOSED') {
                await setSelect(parent.number, 'Status', isTodo);
                await setSelect(parent.number, '개발상태', isDash);
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parent.number,
                  state: 'open',
                });
                console.log(`부모 #${parent.number} reopen + Status/개발상태 리셋 (새 서브 #${issueNum})`);
              } else {
                console.log('처리할 부모 없음 또는 부모 OPEN — 종료');
              }
              return;
            }

            // ====== Case B: issues.reopened ======
            // 다시 열린 이슈 → Status=Todo, 개발상태=—
            if (action === 'reopened') {
              await setSelect(issueNum, 'Status', isTodo);
              await setSelect(issueNum, '개발상태', isDash);
              return;
            }

            // ====== Case C: issues.closed ======
            if (action === 'closed') {
              const parent = await getParent(issueNum);
              if (parent) {
                const parentQ = await github.graphql(`
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $number) {
                        state
                        subIssues(first: 100) { nodes { state } }
                      }
                    }
                  }
                `, { owner: context.repo.owner, repo: context.repo.repo, number: parent.number });
                const p = parentQ.repository.issue;
                if (p.state !== 'CLOSED') {
                  const subs = p.subIssues.nodes;
                  const allClosed = subs.length > 0 && subs.every(s => s.state === 'CLOSED');
                  console.log(`부모 #${parent.number}: ${subs.filter(s=>s.state==='CLOSED').length}/${subs.length}`);
                  if (allClosed) {
                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: parent.number,
                      state: 'closed',
                    });
                    console.log(`부모 #${parent.number} 자동 close — close 이벤트가 다음에 처리`);
                    return;
                  } else {
                    console.log('미완 서브이슈 있음 — 부모 유지');
                    return;
                  }
                } else {
                  console.log('부모 이미 CLOSED');
                  return;
                }
              }

              // parent 없는 이슈 close → 본인 개발상태=수정완료
              await setSelect(issueNum, '개발상태', isDone);
              return;
            }
