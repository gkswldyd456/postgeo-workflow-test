name: 서브이슈 → 부모 자동 close + 개발상태 수정완료

on:
  issues:
    types: [closed]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 서브이슈 close 시 부모 close + 부모 close 시 개발상태 ✅수정완료
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_PAT || secrets.GITHUB_TOKEN }}
          script: |
            // ─ 설정 ────────────────────────────────────
            const PROJECT_ID = 'PVT_kwHOBcajac4BVIW4';
            const FIELD_NAME = '개발상태';
            const TARGET_OPTION = '수정완료';
            // ───────────────────────────────────────────

            const closedNum = context.payload.issue.number;
            console.log(`closed: #${closedNum}`);

            // 1) parent 있으면 → 부모 자동 close 검사
            const subQ = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) {
                    parent { number }
                  }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo, number: closedNum });

            const parent = subQ.repository.issue?.parent;
            if (parent) {
              const parentQ = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      state
                      subIssues(first: 100) { nodes { state } }
                    }
                  }
                }
              `, { owner: context.repo.owner, repo: context.repo.repo, number: parent.number });
              const p = parentQ.repository.issue;
              if (p.state !== 'CLOSED') {
                const subs = p.subIssues.nodes;
                const allClosed = subs.length > 0 && subs.every(s => s.state === 'CLOSED');
                console.log(`부모 #${parent.number}: ${subs.filter(s => s.state==='CLOSED').length}/${subs.length}`);
                if (allClosed) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: parent.number,
                    state: 'closed',
                  });
                  console.log(`부모 #${parent.number} 자동 close — 다음 이벤트에서 개발상태 처리`);
                  return;
                } else {
                  console.log(`아직 미완 서브이슈 있음 — 부모 close 안 함`);
                  return;
                }
              } else {
                console.log(`부모 이미 CLOSED — 종료`);
                return;
              }
            }

            // 2) parent 없는 이슈가 closed → Projects 개발상태=✅수정완료
            const projQ = await github.graphql(`
              query($id: ID!) {
                node(id: $id) {
                  ... on ProjectV2 {
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id name options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { id: PROJECT_ID });
            const field = (projQ.node?.fields?.nodes || []).find(f => f?.name === FIELD_NAME);
            if (!field) {
              console.log(`프로젝트에 '${FIELD_NAME}' 필드 없음`);
              return;
            }
            const opt = field.options.find(o => o.name.includes(TARGET_OPTION));
            if (!opt) {
              console.log(`'${TARGET_OPTION}' 옵션 없음`);
              return;
            }

            const itemQ = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) {
                    projectItems(first: 20) {
                      nodes {
                        id
                        project { id }
                        fieldValueByName(name: "${FIELD_NAME}") {
                          ... on ProjectV2ItemFieldSingleSelectValue { optionId }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo, number: closedNum });
            const items = itemQ.repository.issue?.projectItems?.nodes || [];
            const item = items.find(i => i.project.id === PROJECT_ID);
            if (!item) {
              console.log(`#${closedNum}: 프로젝트에 없음 — 스킵`);
              return;
            }
            if (item.fieldValueByName?.optionId === opt.id) {
              console.log(`#${closedNum}: 이미 ${TARGET_OPTION}`);
              return;
            }

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }
            `, {
              projectId: PROJECT_ID,
              itemId: item.id,
              fieldId: field.id,
              optionId: opt.id,
            });
            console.log(`#${closedNum} → ${TARGET_OPTION}`);
