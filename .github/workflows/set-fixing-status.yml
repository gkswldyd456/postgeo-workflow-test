name: PR 오픈 시 개발상태 수정중으로 변경

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read
  issues: read
  repository-projects: write

jobs:
  set-fixing:
    runs-on: ubuntu-latest
    steps:
      - name: PR body에서 이슈 번호 추출 후 Projects 개발상태 업데이트
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_PAT || secrets.GITHUB_TOKEN }}
          script: |
            // ─ 설정 ────────────────────────────────────
            const PROJECT_ID = 'PVT_kwHOBcajac4BVIW4';
            const FIELD_NAME = '개발상태';
            const TARGET_OPTION = '수정중';
            // ───────────────────────────────────────────

            // 1) 프로젝트의 개발상태 필드/옵션 정보 (이슈 값 유무와 무관)
            const projQ = await github.graphql(`
              query($id: ID!) {
                node(id: $id) {
                  ... on ProjectV2 {
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { id: PROJECT_ID });

            const field = (projQ.node?.fields?.nodes || []).find(f => f?.name === FIELD_NAME);
            if (!field) {
              core.setFailed(`프로젝트에 '${FIELD_NAME}' 필드 없음`);
              return;
            }
            const targetOpt = field.options.find(o => o.name.includes(TARGET_OPTION));
            if (!targetOpt) {
              core.setFailed(`'${TARGET_OPTION}' 옵션 없음`);
              return;
            }

            const body = context.payload.pull_request.body || '';
            const matches = body.match(/(?:fixes|closes|resolves)\s+#(\d+)/gi) || [];
            const issueNumbers = [...new Set(matches.map(m => parseInt(m.match(/\d+/)[0])))];
            if (issueNumbers.length === 0) {
              console.log('PR body에 fixes/closes/resolves #N 형식 이슈 참조가 없습니다.');
              return;
            }
            console.log(`처리할 이슈: ${issueNumbers.join(', ')}`);

            for (const issueNum of issueNumbers) {
              const q = await github.graphql(`
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      projectItems(first: 20) {
                        nodes {
                          id
                          project { id }
                          fieldValueByName(name: "${FIELD_NAME}") {
                            ... on ProjectV2ItemFieldSingleSelectValue { optionId }
                          }
                        }
                      }
                    }
                  }
                }
              `, { owner: context.repo.owner, repo: context.repo.repo, number: issueNum });

              const items = q.repository.issue?.projectItems?.nodes || [];
              const item = items.find(i => i.project.id === PROJECT_ID);
              if (!item) {
                console.log(`#${issueNum}: 프로젝트에 없음`);
                continue;
              }
              if (item.fieldValueByName?.optionId === targetOpt.id) {
                console.log(`#${issueNum}: 이미 ${TARGET_OPTION}`);
                continue;
              }

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: PROJECT_ID,
                itemId: item.id,
                fieldId: field.id,
                optionId: targetOpt.id,
              });
              console.log(`#${issueNum} → ${TARGET_OPTION}`);
            }
